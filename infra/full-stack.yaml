AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Full stack deployment: SageMaker TGI endpoint + API Gateway + Lambda + OpenWebUI on Fargate.
  Deploys an OpenAI-compatible API backed by a SageMaker endpoint running HuggingFace TGI.
  Supports integration with existing SageMaker Domain (e.g., sg-finetune) via ExternalSageMakerRoleArn.

Parameters:
  # Model Configuration
  HuggingFaceModelId:
    Type: String
    Default: oriolrius/myemoji-gemma-3-270m-it
    Description: HuggingFace model ID to deploy

  SageMakerInstanceType:
    Type: String
    Default: ml.g5.xlarge
    Description: SageMaker endpoint instance type (must be GPU with bfloat16 support for Gemma 3)
    AllowedValues:
      - ml.g4dn.xlarge
      - ml.g4dn.2xlarge
      - ml.g5.xlarge
      - ml.g5.2xlarge

  # SageMaker Domain Integration (Optional)
  ExternalSageMakerRoleArn:
    Type: String
    Default: ''
    Description: >
      (Optional) ARN of an existing SageMaker execution role from another stack (e.g., sg-finetune).
      If provided, the endpoint will use this role instead of creating a new one.
      This enables integration with an existing SageMaker Domain.
      Example: arn:aws:iam::123456789012:role/sg-finetune-sagemaker-execution-role

  # Lambda Configuration
  LambdaS3Bucket:
    Type: String
    Description: S3 bucket containing Lambda deployment package

  LambdaS3Key:
    Type: String
    Description: S3 key for Lambda deployment package

  # Network Configuration
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for deployment

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet (must be public)

  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet in a different AZ (required for ALB)

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Model Configuration
        Parameters:
          - HuggingFaceModelId
          - SageMakerInstanceType
      - Label:
          default: SageMaker Domain Integration (Optional)
        Parameters:
          - ExternalSageMakerRoleArn
      - Label:
          default: Lambda Configuration
        Parameters:
          - LambdaS3Bucket
          - LambdaS3Key
      - Label:
          default: Network Configuration
        Parameters:
          - VpcId
          - SubnetId
          - SubnetId2

Conditions:
  UseExternalSageMakerRole: !Not [!Equals [!Ref ExternalSageMakerRoleArn, '']]
  CreateLocalSageMakerRole: !Equals [!Ref ExternalSageMakerRoleArn, '']

Resources:
  #############################################
  # SageMaker Resources
  #############################################

  # Local execution role - only created if ExternalSageMakerRoleArn is not provided
  SageMakerExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateLocalSageMakerRole
    Properties:
      RoleName: !Sub '${AWS::StackName}-sagemaker-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: ECRAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                Resource: '*'

  SageMakerModel:
    Type: AWS::SageMaker::Model
    Properties:
      ModelName: !Sub '${AWS::StackName}-vllm-model'
      # Use external role if provided, otherwise use the local role
      ExecutionRoleArn: !If
        - UseExternalSageMakerRole
        - !Ref ExternalSageMakerRoleArn
        - !GetAtt SageMakerExecutionRole.Arn
      PrimaryContainer:
        Image: !Sub '763104351884.dkr.ecr.${AWS::Region}.amazonaws.com/huggingface-pytorch-tgi-inference:2.7.0-tgi3.3.6-gpu-py311-cu124-ubuntu22.04-v1.0'
        Environment:
          HF_MODEL_ID: !Ref HuggingFaceModelId
          SM_NUM_GPUS: '1'
          MAX_INPUT_TOKENS: '1024'
          MAX_TOTAL_TOKENS: '2048'
          DTYPE: bfloat16
          MAX_CONCURRENT_REQUESTS: '4'

  SageMakerEndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    Properties:
      EndpointConfigName: !Sub '${AWS::StackName}-vllm-config'
      ProductionVariants:
        - VariantName: primary
          ModelName: !GetAtt SageMakerModel.ModelName
          InitialInstanceCount: 1
          InstanceType: !Ref SageMakerInstanceType
          InitialVariantWeight: 1.0
          ContainerStartupHealthCheckTimeoutInSeconds: 900

  SageMakerEndpoint:
    Type: AWS::SageMaker::Endpoint
    Properties:
      EndpointName: !Sub '${AWS::StackName}-vllm-endpoint'
      EndpointConfigName: !GetAtt SageMakerEndpointConfig.EndpointConfigName

  #############################################
  # Lambda Resources
  #############################################

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SageMakerInvokePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sagemaker:InvokeEndpoint
                Resource: !Sub 'arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/${AWS::StackName}-vllm-endpoint'

  LambdaFunction:
    Type: AWS::Lambda::Function
    DependsOn: SageMakerEndpoint
    Properties:
      FunctionName: !Sub '${AWS::StackName}-openai-proxy'
      Runtime: python3.11
      Handler: index.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 60
      MemorySize: 256
      Environment:
        Variables:
          SAGEMAKER_ENDPOINT_NAME: !Sub '${AWS::StackName}-vllm-endpoint'
          AWS_REGION_NAME: !Ref AWS::Region
      Code:
        S3Bucket: !Ref LambdaS3Bucket
        S3Key: !Ref LambdaS3Key

  #############################################
  # API Gateway Resources
  #############################################

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${AWS::StackName}-api'
      ProtocolType: HTTP
      Description: OpenAI-compatible API for SageMaker TGI endpoint
      CorsConfiguration:
        AllowOrigins: ['*']
        AllowMethods: [GET, POST, OPTIONS]
        AllowHeaders: [Content-Type, Authorization]

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: '$default'
      AutoDeploy: true

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  ChatCompletionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /v1/chat/completions'
      Target: !Sub 'integrations/${LambdaIntegration}'

  CompletionsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'POST /v1/completions'
      Target: !Sub 'integrations/${LambdaIntegration}'

  ModelsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: 'GET /v1/models'
      Target: !Sub 'integrations/${LambdaIntegration}'

  LambdaApiGatewayPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*'

  #############################################
  # ECS / Fargate Resources (OpenWebUI)
  #############################################

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${AWS::StackName}-cluster'

  OpenWebUILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${AWS::StackName}/openwebui'
      RetentionInDays: 7

  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${AWS::StackName}-ecs-execution-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  OpenWebUITaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn: HttpApi
    Properties:
      Family: !Sub '${AWS::StackName}-openwebui'
      Cpu: '512'
      Memory: '1024'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt ECSTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: openwebui
          Image: ghcr.io/open-webui/open-webui:main
          Essential: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: OPENAI_API_BASE_URL
              Value: !Sub '${HttpApi.ApiEndpoint}/v1'
            - Name: OPENAI_API_KEY
              Value: not-required
            - Name: WEBUI_AUTH
              Value: 'false'
            - Name: ENABLE_OLLAMA_API
              Value: 'false'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OpenWebUILogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: openwebui

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-alb-sg'
      GroupDescription: Security group for OpenWebUI ALB
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP access
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic

  FargateSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${AWS::StackName}-fargate-sg'
      GroupDescription: Security group for OpenWebUI Fargate tasks
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Traffic from ALB
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${AWS::StackName}-alb'
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Subnets:
        - !Ref SubnetId
        - !Ref SubnetId2

  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${AWS::StackName}-tg'
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 5

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  OpenWebUIService:
    Type: AWS::ECS::Service
    DependsOn: ALBListener
    Properties:
      ServiceName: !Sub '${AWS::StackName}-openwebui'
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref OpenWebUITaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref FargateSecurityGroup
          Subnets:
            - !Ref SubnetId
            - !Ref SubnetId2
      LoadBalancers:
        - ContainerName: openwebui
          ContainerPort: 8080
          TargetGroupArn: !Ref ALBTargetGroup

Outputs:
  SageMakerEndpointName:
    Description: SageMaker endpoint name
    Value: !Sub '${AWS::StackName}-vllm-endpoint'

  SageMakerExecutionRoleArn:
    Description: SageMaker execution role ARN being used
    Value: !If
      - UseExternalSageMakerRole
      - !Ref ExternalSageMakerRoleArn
      - !GetAtt SageMakerExecutionRole.Arn

  SageMakerIntegrationMode:
    Description: Whether using external Domain role or standalone
    Value: !If
      - UseExternalSageMakerRole
      - 'Integrated (using external SageMaker Domain role)'
      - 'Standalone (using locally created role)'

  ApiGatewayEndpoint:
    Description: API Gateway endpoint URL
    Value: !GetAtt HttpApi.ApiEndpoint

  OpenWebUIUrl:
    Description: OpenWebUI URL (via ALB)
    Value: !Sub 'http://${ApplicationLoadBalancer.DNSName}'

  TestCurlCommand:
    Description: Test the API Gateway directly
    Value: !Sub |
      curl -X POST ${HttpApi.ApiEndpoint}/v1/chat/completions \
        -H "Content-Type: application/json" \
        -d '{"messages": [{"role": "user", "content": "The future of AI is"}], "max_tokens": 50}'
